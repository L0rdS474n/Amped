name: Bug report
description: Report a defect in Amped
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please do **not** include real credentials, tokens, or
        personal data. For security vulnerabilities, use private reporting (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem and what you expected instead.
      placeholder: When I ..., Amped ...; I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Affected area / milestone
      description: e.g. amped-plugin-api, amped-registry, M2 host
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust version (rustc --version), commit SHA.
      placeholder: |
        OS: ...
        rustc: ...
        commit: ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Test output, error messages, or logs. Redact any secrets.
      render: shell
    validations:
      required: false
