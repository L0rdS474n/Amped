name: Feature request
description: Suggest an idea or improvement for Amped
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits?
      placeholder: As a ..., I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Amped do? Sketch the behavior or API.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Plugin contract / API
        - Plugin host / runtime
        - Registry / plugin store
        - UI / dashboard
        - Easee plugin
        - New plugin (solar, battery, prices, weather, ...)
        - Tooling / CI / docs
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
